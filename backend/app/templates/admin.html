<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理者画面（見た目のみ）</title>
  <style>
    :root{--bg:#0b1020;--card:#0f162f;--line:#1f2a44;--fg:#e5e7eb;--muted:#9ca3af;--acc:#6366f1}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .container{max-width:1100px;margin:40px auto;padding:0 16px}
    h1{font-size:1.4rem;margin:0 0 14px}
    .hint{font-size:.9rem;color:var(--muted);margin-bottom:14px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .btn{background:var(--acc);color:#fff;border:none;border-radius:12px;padding:10px 14px;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--fg)}
    .grid{display:grid;gap:16px}
    @media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
    .card{background:linear-gradient(180deg,#0e152e 0%, #0a1124 100%);border:1px solid var(--line);border-radius:16px;padding:14px}
    h2{font-size:1.05rem;margin:0 0 10px}
    .tag{display:inline-block;border:1px solid var(--line);color:var(--muted);padding:4px 8px;border-radius:999px;font-size:.8rem}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:.85rem;color:var(--muted);text-align:left;border-bottom:1px solid var(--line);padding:8px}
    tbody td{border-bottom:1px solid var(--line);padding:8px}
    .cell{display:block;background:#0b1226;border:1px solid #1f2937;color:var(--fg);padding:9px 10px;border-radius:10px}
    .placeholder{opacity:.6}
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h1>管理者画面</h1>
        <div class="hint">※これはUIの見た目だけのモックです（機能なし）。</div>
      </div>
      <button class="btn" aria-disabled="true">メンバーを追加</button>
    </div>

    <div class="grid">
      <!-- 教員 -->
      <section class="card" aria-label="教員リスト">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h2>教員リスト</h2>
          <span class="tag">名前 / メール</span>
        </div>
        <table>
          <thead>
            <tr><th style="width:42%">名前</th><th style="width:58%">メールアドレス</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="cell">山田 太郎</span></td>
              <td><span class="cell">taro.yamada@example.com</span></td>
            </tr>
            <tr>
              <td><span class="cell placeholder">（名前）</span></td>
              <td><span class="cell placeholder">（email@example.com）</span></td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- 養護教諭 -->
      <section class="card" aria-label="養護教諭リスト">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h2>養護教諭リスト</h2>
          <span class="tag">名前 / メール</span>
        </div>
        <table>
          <thead>
            <tr><th style="width:42%">名前</th><th style="width:58%">メールアドレス</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="cell">佐藤 花子</span></td>
              <td><span class="cell">hanako.sato@example.jp</span></td>
            </tr>
            <tr>
              <td><span class="cell placeholder">（名前）</span></td>
              <td><span class="cell placeholder">（email@example.com）</span></td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- カウンセラー -->
      <section class="card" aria-label="カウンセラーリスト">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h2>カウンセラーリスト</h2>
          <span class="tag">名前 / メール</span>
        </div>
        <table>
          <thead>
            <tr><th style="width:42%">名前</th><th style="width:58%">メールアドレス</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="cell">田中 司</span></td>
              <td><span class="cell">tsukasa.tanaka@example.net</span></td>
            </tr>
            <tr>
              <td><span class="cell placeholder">（名前）</span></td>
              <td><span class="cell placeholder">（email@example.com）</span></td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
  </div>
</body>
</html>
