{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <!-- Chat -->
  <div class="lg:col-span-2 bg-white rounded-2xl shadow p-4">
    <h2 class="text-lg font-semibold mb-3">Webチャット（ストリーミング）</h2>

    <div id="status" class="text-xs text-gray-500 mb-2">未送信</div>
    <div id="chat" class="h-[50vh] overflow-y-auto space-y-3 border rounded p-3 bg-gray-50"></div>

    <div class="mt-3 flex items-start gap-2">
      <textarea id="msg" class="flex-1 border rounded p-2 h-24" placeholder="いまの気持ちや状況を書いてください"></textarea>
      <div class="w-40 space-y-2">
        <label class="block text-sm">
          <input id="anon" type="checkbox" class="mr-1" checked> 匿名で送信
        </label>
        <input id="name" type="text" class="w-full border rounded p-1 text-sm" placeholder="（任意）お名前">
        <button id="sendBtn" onclick="sendMsg()" class="w-full bg-indigo-600 text-white rounded py-2">送信</button>
      </div>
    </div>
  </div>

  <!-- AIリスクパネル -->
  <div class="bg-white rounded-2xl shadow p-4">
    <h3 class="text-lg font-semibold mb-3">AIリスク（最新）</h3>
    <p id="aiSummary" class="text-sm text-gray-800 mb-3">要約：—</p>
    <div class="text-sm space-y-2">
      <div class="flex justify-between"><span>総合</span><span id="riskOverall">—</span></div>
      <div class="flex justify-between"><span>希死念慮(self_harm)</span><span id="riskSelfHarm">—</span></div>
      <div class="flex justify-between"><span>いじめ(bullying)</span><span id="riskBullying">—</span></div>
      <div class="flex justify-between"><span>不登校(truancy)</span><span id="riskTruancy">—</span></div>
      <div class="flex justify-between"><span>健康(health)</span><span id="riskHealth">—</span></div>
    </div>
    <p id="riskReason" class="text-xs text-gray-500 mt-3">根拠：—</p>
    <hr class="my-3">
    <button class="text-sm text-indigo-600 underline" onclick="loadMyLogs()">自分のログを読み直す</button>
    <div id="myLogs" class="mt-2 space-y-2 text-xs"></div>
  </div>
</div>

<script>
let currentUserId = localStorage.getItem('student_support_uid') || null;
const chatEl = document.getElementById('chat');
const statusEl = document.getElementById('status');

function line(text, side='left'){
  const wrap = document.createElement('div');
  wrap.className = `flex ${side==='right'?'justify-end':''}`;
  const bubble = document.createElement('div');
  bubble.className = `max-w-[80%] p-2 rounded-xl ${side==='right'?'bg-indigo-600 text-white':'bg-white border'} shadow whitespace-pre-wrap`;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble; // 返答バブルを返す（ストリームで伸長する）
}

function setRiskPanel(res){
  document.getElementById('aiSummary').textContent = '要約：' + (res.ai_summary ?? '—');
  document.getElementById('riskOverall').textContent = (res.ai_risk_overall ?? '—');
  const det = res.ai_risk_detail || {};
  const sc = det.scores || {};
  document.getElementById('riskSelfHarm').textContent = sc.self_harm ?? '—';
  document.getElementById('riskBullying').textContent = sc.bullying ?? '—';
  document.getElementById('riskTruancy').textContent = sc.truancy ?? '—';
  document.getElementById('riskHealth').textContent = sc.health ?? '—';
  document.getElementById('riskReason').textContent = '根拠：' + (det.reason ?? '—');

  const overall = Number(res.ai_risk_overall || 0);
  document.getElementById('riskOverall').className = overall >= 7 ? 'text-red-600 font-semibold' : '';
}

async function sendMsg(){
  const text = document.getElementById('msg').value.trim();
  const is_anonymous = document.getElementById('anon').checked;
  const name = document.getElementById('name').value.trim() || null;
  if(!text){ return; }

  // 自分の発言を右側に表示
  line(text, 'right');
  document.getElementById('msg').value = '';
  statusEl.textContent = '送信中…';

  // 左側のAIバブル（空）を作って、ストリームで伸ばす
  const aiBubble = line('', 'left');

  const res = await fetch('/api/chat_stream', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text, is_anonymous, name }),
  });

  if(!res.ok || !res.body){
    statusEl.textContent = '送信失敗';
    aiBubble.textContent = 'サーバエラーが発生しました。';
    return;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buffer = '';

  // SSEを行単位でパース
  while(true){
    const { value, done } = await reader.read();
    if(done) break;
    buffer += decoder.decode(value, {stream:true});

    let idx;
    while((idx = buffer.indexOf('\n\n')) >= 0){
      const eventChunk = buffer.slice(0, idx).trim();
      buffer = buffer.slice(idx + 2);

      // "data: {...}" 形式のみ扱う
      if(eventChunk.startsWith('data:')){
        const jsonStr = eventChunk.slice(5).trim();
        if(!jsonStr) continue;
        try{
          const evt = JSON.parse(jsonStr);
          if(evt.type === 'delta'){
            aiBubble.textContent += evt.text || '';
            chatEl.scrollTop = chatEl.scrollHeight;
          }else if(evt.type === 'final'){
            const result = evt.result || {};
            // user_id を保存
            if(result.user_id){
              currentUserId = result.user_id;
              localStorage.setItem('student_support_uid', currentUserId);
            }
            // リスクパネル更新
            setRiskPanel(result);
            statusEl.textContent = '送信完了';
          }else if(evt.type === 'error'){
            aiBubble.textContent += `\n[エラー] ${evt.message || '不明なエラー'}`;
            statusEl.textContent = '送信失敗';
          }
        }catch(_e){
          // パース失敗は無視（次チャンクを待つ）
        }
      }
    }
  }
}

async function loadMyLogs(){
  if(!currentUserId){
    document.getElementById('myLogs').innerHTML = '<div class="text-gray-500">まだ送信履歴がありません。</div>';
    return;
  }
  const r = await fetch(`/api/messages/${currentUserId}`);
  const data = await r.json();
  const box = document.getElementById('myLogs');
  box.innerHTML = '';
  data.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'border rounded p-2 bg-gray-50';
    const det = m.ai_risk_detail || {};
    const sc = det.scores || {};
    div.textContent = `[${m.created_at}] 総合:${m.ai_risk_overall ?? '-'} / `+
                      `self:${sc.self_harm ?? '-'} bully:${sc.bullying ?? '-'} tru:${sc.truancy ?? '-'} health:${sc.health ?? '-'}`;
    box.appendChild(div);
  });
}
</script>
{% endblock %}
