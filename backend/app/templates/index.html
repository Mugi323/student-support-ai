{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div class="bg-white rounded-2xl shadow p-6">
    <h2 class="text-xl font-semibold mb-2">ようこそ</h2>
    <p class="text-sm text-gray-600 mb-4">メニューから利用したい機能を選んでください。</p>
    <div class="space-y-3">
      <a href="/chat" class="block w-full text-left bg-indigo-600 text-white px-4 py-3 rounded hover:opacity-90">チャットで相談する</a>
      <a href="/chat_from_ai" class="block w-full text-left bg-indigo-600 text-white px-4 py-3 rounded hover:opacity-90">AIからのメッセージ</a>
      <a href="/dashboard" class="block w-full text-left border px-4 py-3 rounded hover:bg-gray-50">AIリスク一覧（教員向け）</a>
      <a href="/messages" class="block w-full text-left border px-4 py-3 rounded hover:bg-gray-50">自分のログを見る</a>
      <a href="/admin" class="block w-full text-left border px-4 py-3 rounded hover:bg-gray-50">管理者画面</a>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow p-6">
    <h3 class="text-lg font-semibold mb-2">ヘルプ</h3>
    <p class="text-sm text-gray-600">本ツールは学校の相談支援を補助する目的で設計されたAIチャットです。利用にあたっては学校のルールに従ってください。</p>
    <hr class="my-4">
    <h4 class="font-medium">よくある質問</h4>
    <ul class="list-disc pl-5 text-sm text-gray-700 mt-2 space-y-1">
      <li>チャットは匿名で利用できます（要ログイン）</li>
      <li>教員はダッシュボードで生徒のリスクを確認できます</li>
      <li>緊急時は学校・保護者に連絡してください</li>
    </ul>
  </div>
</div>
{% endblock %}
