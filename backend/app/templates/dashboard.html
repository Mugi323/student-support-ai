{% extends "base.html" %}
{% block content %}
<div class="bg-white p-5 rounded-2xl shadow">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">要対応ランキング</h2>
    <form method="get" class="flex gap-2">
      <input name="q" value="{{ q }}" class="border rounded px-2 py-1" placeholder="検索（ID/要約/タグ）">
      <button class="bg-gray-800 text-white px-3 py-1 rounded">検索</button>
    </form>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead>
        <tr class="text-left border-b">
          <th class="py-2 pr-4">ユーザーID</th>
          <th class="py-2 pr-4">平均リスク</th>
          <th class="py-2 pr-4">件数</th>
          <th class="py-2 pr-4">直近タグ</th>
          <th class="py-2 pr-4">直近要約</th>
          <th class="py-2 pr-4">最終時刻</th>
          <th class="py-2">ログ</th>
        </tr>
      </thead>
      <tbody>
        {% for x in items %}
        <tr class="border-b align-top">
          <td class="py-2 pr-4 font-mono">{{ x.user_id }}</td>
          <td class="py-2 pr-4">{{ x.avg_risk }}</td>
          <td class="py-2 pr-4">{{ x.cnt }}</td>
          <td class="py-2 pr-4">{{ x.last_tags }}</td>
          <td class="py-2 pr-4">{{ x.last_summary }}</td>
          <td class="py-2 pr-4">{{ x.last_at }}</td>
          <td class="py-2">
            <button class="text-indigo-600 underline" onclick="openLogs('{{ x.user_id }}')">表示</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div id="logs" class="mt-6 hidden">
    <h3 class="font-semibold mb-2">ログ</h3>
    <div id="logsList" class="space-y-2 text-sm"></div>
  </div>
</div>

<script>
async function openLogs(uid){
  const res = await fetch(`/api/messages/${uid}`);
  const data = await res.json();
  const wrap = document.getElementById('logs');
  const list = document.getElementById('logsList');
  list.innerHTML = '';
  data.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'border rounded p-2 bg-gray-50';
    const p1 = document.createElement('p'); p1.textContent = m.text;
    const p2 = document.createElement('p'); p2.className = 'text-xs text-gray-600';
    p2.textContent = `リスク:${m.risk_score} / 感情:${m.sentiment} / タグ:${(m.tags||[]).join(', ')} / ${m.created_at}`;
    div.appendChild(p1); div.appendChild(p2);
    list.appendChild(div);
  });
  wrap.classList.remove('hidden');
  wrap.scrollIntoView({behavior:'smooth'});
}
</script>
{% endblock %}
