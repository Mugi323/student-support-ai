{% extends "base.html" %}
{% block content %}
<div class="bg-white p-5 rounded-2xl shadow">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">要対応ランキング（AIリスク）</h2>
    <form method="get" class="flex gap-2">
      <input name="q" value="{{ q }}" class="border rounded px-2 py-1" placeholder="検索（ID/要約）">
      <button class="bg-gray-800 text-white px-3 py-1 rounded">検索</button>
    </form>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead>
        <tr class="text-left border-b">
          <th class="py-2 pr-4">ユーザーID</th>
          <th class="py-2 pr-4">平均AIリスク</th>
          <th class="py-2 pr-4">件数</th>
          <th class="py-2 pr-4">直近AI要約</th>
          <th class="py-2 pr-4">直近AIリスク</th>
          <th class="py-2 pr-4">最終時刻</th>
          <th class="py-2">ログ</th>
        </tr>
      </thead>
      <tbody>
        {% for x in items %}
        <tr class="border-b align-top">
          <td class="py-2 pr-4 font-mono">{{ x.user_id }}</td>
          <td class="py-2 pr-4">{{ '%.2f'|format(x.avg_ai_risk) }}</td>
          <td class="py-2 pr-4">{{ x.cnt }}</td>
          <td class="py-2 pr-4">{{ x.last_summary }}</td>
          <td class="py-2 pr-4">{{ '%.2f'|format(x.last_ai_risk or 0) }}</td>
          <td class="py-2 pr-4">{{ x.last_at }}</td>
          <td class="py-2">
            <button class="text-indigo-600 underline" onclick="openLogs('{{ x.user_id }}')">表示</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div id="logs" class="mt-6 hidden">
    <h3 class="font-semibold mb-2">ログ</h3>
    <div id="logsList" class="space-y-2 text-sm"></div>
  </div>
</div>

<script>
async function openLogs(uid){
  const res = await fetch(`/api/messages/${uid}`);
  const data = await res.json();

  const wrap = document.getElementById('logs');
  const list = document.getElementById('logsList');
  list.innerHTML = '';

  data.forEach(m=>{
    const det = m.ai_risk_detail || {};
    const scores = det.scores || {};
    const reason = det.reason || '';

    const div = document.createElement('div');
    div.className = 'border rounded p-3 bg-gray-50';

    const pSum = document.createElement('p');
    pSum.className = 'font-medium';
    pSum.textContent = m.ai_summary || '(要約なし)';

    const pText = document.createElement('p');
    pText.className = 'mt-1';
    pText.textContent = m.text;

    const pInfo = document.createElement('p');
    pInfo.className = 'text-xs text-gray-600 mt-1';
    pInfo.textContent = `AI総合: ${Number(m.ai_risk_overall || 0).toFixed(2)} / ${m.created_at}`;

    const pScores = document.createElement('p');
    pScores.className = 'text-xs text-gray-700 mt-1';
    pScores.textContent =
      `self_harm:${(scores.self_harm ?? 0).toFixed(2)}, ` +
      `bullying:${(scores.bullying ?? 0).toFixed(2)}, ` +
      `truancy:${(scores.truancy ?? 0).toFixed(2)}, ` +
      `health:${(scores.health ?? 0).toFixed(2)}`;

    const pReason = document.createElement('p');
    pReason.className = 'text-xs text-gray-500 mt-1';
    pReason.textContent = reason ? `根拠: ${reason}` : '';

    div.appendChild(pSum);
    div.appendChild(pText);
    div.appendChild(pInfo);
    div.appendChild(pScores);
    if (reason) div.appendChild(pReason);

    list.appendChild(div);
  });

  wrap.classList.remove('hidden');
  wrap.scrollIntoView({behavior:'smooth'});
}
</script>
{% endblock %}
