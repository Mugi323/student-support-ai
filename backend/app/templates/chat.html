{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <!-- Chat -->
  <div class="lg:col-span-2 bg-white rounded-2xl shadow p-4">
    <div class="flex justify-between items-center mb-3">
      <div class="flex items-center gap-2">
        <h2 class="text-lg font-semibold">AIチャット</h2>
        <!-- 未読バッジ -->
        <span id="chatUnreadBadge" class="hidden bg-red-500 text-white text-xs px-2 py-0.5 rounded-full"></span>
      </div>
      
      <!-- API切り替えボタン -->
      <div class="flex items-center gap-2">
        <label class="text-sm text-gray-600">AI:</label>
        <select id="apiSelector" class="text-sm border rounded-lg px-3 py-1 bg-white hover:bg-gray-50 transition">
          <option value="openai">GPT-5-nano</option>
          <option value="ollama">Qwen3 8B</option>
        </select>
      </div>
    </div>

    <div id="status" class="text-xs text-gray-500 mb-2">未送信</div>
    <div id="chat" class="h-[50vh] overflow-y-auto space-y-3 border rounded p-3 bg-gray-50"></div>

    <!-- 入力エリア -->
    <div class="mt-3 border-2 border-gray-300 rounded-xl p-3 bg-white">
      <!-- 画像プレビューエリア -->
      <div id="imagePreviewContainer" class="mb-2 flex flex-wrap gap-2"></div>
      
      <!-- テキスト入力と送信ボタン -->
      <div class="flex items-end gap-2">
        <!-- 画像添付ボタン（左端） -->
        <label for="imageInput" class="cursor-pointer p-2 rounded-lg hover:bg-gray-100 transition self-end" title="画像を添付">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
          </svg>
          <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="handleImageSelect(event)">
        </label>
        
        <textarea 
          id="msg" 
          class="flex-1 border-0 focus:outline-none resize-none p-2 min-h-[60px] max-h-[200px]" 
          placeholder="いまの気持ちや状況を書いてください"
          onkeydown="handleKeyDown(event)"
        ></textarea>
        
        <!-- 送信ボタン（右端・90度回転） -->
        <button 
          id="sendBtn" 
          onclick="sendMsg()" 
          class="p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed self-end" 
          title="送信"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform rotate-90" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- AIリスクパネル -->
  <div class="bg-white rounded-2xl shadow p-4">
    <h3 class="text-lg font-semibold mb-3">AIリスク（最新）</h3>
    <p id="aiSummary" class="text-sm text-gray-800 mb-3">要約：—</p>
    <div class="text-sm space-y-2">
    <div class="flex justify-between"><span>総合</span><span id="riskOverall">—</span></div>
    <div class="flex justify-between"><span>健康</span><span id="riskHealth">—</span></div>
    <div class="flex justify-between"><span>家族</span><span id="riskFamily">—</span></div>
    <div class="flex justify-between"><span>友人</span><span id="riskFriends">—</span></div>
    <div class="flex justify-between"><span>学習</span><span id="riskLearning">—</span></div>
    <div class="flex justify-between"><span>いじめ</span><span id="riskBullying">—</span></div>
    </div>
    <p id="riskReason" class="text-xs text-gray-500 mt-3">根拠：—</p>
    <hr class="my-3">
    <button id="toggleLogsBtn" class="text-sm text-indigo-600 underline inline-flex items-center gap-2" onclick="toggleMyLogs()">
      <span>ログを読み直す</span>
      <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 011.08 1.04l-4.25 4.25a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
      </svg>
    </button>
    <div id="myLogsWrapper" class="mt-2 overflow-hidden transition-all duration-300" style="max-height:0; opacity:0;">
      <div id="myLogs" class="space-y-2 text-xs p-1"></div>
    </div>
  </div>
</div>

<script>
// 以下は index.html のチャットスクリプトをそのまま流用します
let currentUserId = null;
const chatEl = document.getElementById('chat');
const statusEl = document.getElementById('status');

// APIセレクターの変更を監視
document.addEventListener('DOMContentLoaded', () => {
  const apiSelector = document.getElementById('apiSelector');
  apiSelector.addEventListener('change', (e) => {
    const api = e.target.value;
    if(api === 'ollama'){
      statusEl.textContent = 'Qwen3 8Bを使用中';
      statusEl.className = 'text-xs text-green-600 mb-2';
    } else {
      statusEl.textContent = 'GPT-4o-miniを使用中';
      statusEl.className = 'text-xs text-blue-600 mb-2';
    }
  });
});

// ファイルをData URLに変換するヘルパー関数
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = (e) => reject(e);
    reader.readAsDataURL(file);
  });
}

function line(text, side='left', images=[]){
  const wrap = document.createElement('div');
  wrap.className = `flex ${side==='right'?'justify-end':''}`;
  const bubble = document.createElement('div');
  bubble.className = `max-w-[80%] p-2 rounded-xl ${side==='right'?'bg-indigo-600 text-white':'bg-white border'} shadow whitespace-pre-wrap`;
  
  // 画像がある場合は画像を表示
  if(images && images.length > 0){
    const imgContainer = document.createElement('div');
    imgContainer.className = 'flex flex-wrap gap-2 mb-2';
    images.forEach(imgSrc => {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.className = 'max-w-[200px] max-h-[200px] rounded cursor-pointer hover:opacity-80';
      img.onclick = () => {
        // クリックで拡大表示
        window.open(imgSrc, '_blank');
      };
      imgContainer.appendChild(img);
    });
    bubble.appendChild(imgContainer);
  }
  
  // テキストを表示
  if(text){
    const textNode = document.createElement('div');
    textNode.textContent = text;
    bubble.appendChild(textNode);
  }
  
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function setRiskPanel(res){
  document.getElementById('aiSummary').textContent = '要約：' + (res.ai_summary ?? '—');
  document.getElementById('riskOverall').textContent = (res.ai_risk_overall ?? '—');

  const det = res.ai_risk_detail || {};
  const sc = det.scores || {};

  document.getElementById('riskHealth').textContent   = sc.health   ?? '—';
  document.getElementById('riskFamily').textContent   = sc.family   ?? '—';
  document.getElementById('riskFriends').textContent  = sc.friends  ?? '—';
  document.getElementById('riskLearning').textContent = sc.learning ?? '—';
  document.getElementById('riskBullying').textContent = sc.bullying ?? '—';

  document.getElementById('riskReason').textContent = '根拠：' + (det.reason ?? '—');

  const overall = Number(res.ai_risk_overall || 0);
  document.getElementById('riskOverall').className =
    overall >= 7 ? 'text-red-600 font-semibold' : '';
  
  // いずれかの項目が8以上の場合、先生への相談を優しく促すメッセージを表示
  const health = Number(sc.health || 0);
  const family = Number(sc.family || 0);
  const friends = Number(sc.friends || 0);
  const learning = Number(sc.learning || 0);
  const bullying = Number(sc.bullying || 0);
  
  const hasHighRisk = health >= 8 || family >= 8 || friends >= 8 || learning >= 8 || bullying >= 8;
  
  if(hasHighRisk){
    showTeacherConsultationPrompt();
  }
}

function showTeacherConsultationPrompt(){
  // チャット画面に優しく先生への相談を促すメッセージを表示
  const wrap = document.createElement('div');
  wrap.className = 'flex justify-center my-4';
  
  const bubble = document.createElement('div');
  bubble.className = 'max-w-[90%] p-4 rounded-xl bg-blue-50 border border-blue-200 shadow-md';
  
  const message = document.createElement('div');
  message.className = 'mb-3 text-center';
  message.innerHTML = `
    <div class="flex items-center justify-center gap-2 mb-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" viewBox="0 0 20 20" fill="currentColor">
        <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z" />
      </svg>
      <span class="font-medium text-blue-700">大丈夫ですか？</span>
    </div>
    <p class="text-sm text-gray-700 leading-relaxed">
      つらいこと、心配なことがあるときは、<br>
      一人で抱え込まずに話してみませんか？<br>
      <br>
      先生はいつでもあなたの味方です。<br>
      安心して相談してくださいね。
    </p>
  `;
  
  const buttonContainer = document.createElement('div');
  buttonContainer.className = 'flex justify-center mt-3';
  
  const normalBtn = document.createElement('a');
  normalBtn.href = '/chat_teacher';
  normalBtn.className = 'px-5 py-2.5 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm font-medium inline-flex items-center gap-2 shadow-sm';
  normalBtn.innerHTML = `
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
    </svg>
    先生に相談する
  `;
  
  buttonContainer.appendChild(normalBtn);
  
  bubble.appendChild(message);
  bubble.appendChild(buttonContainer);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function sendMsg(){
  const text = document.getElementById('msg').value.trim();
  if(!text && selectedImages.length === 0){ 
    return; 
  }

  // 画像をData URLに変換
  const imageDataUrls = [];
  for(const img of selectedImages){
    const dataUrl = await fileToDataURL(img);
    imageDataUrls.push(dataUrl);
  }

  // メッセージを画像と一緒に表示
  line(text, 'right', imageDataUrls);
  
  const imagesToSend = [...selectedImages]; // コピーを作成
  document.getElementById('msg').value = '';
  clearAllImages();
  statusEl.textContent = '送信中…';

  const aiBubble = line('', 'left');

  // 選択されたAPIを取得
  const selectedApi = document.getElementById('apiSelector').value;

  // 画像がある場合はFormDataを使用（OpenAIのみ）
  let res;
  if(imagesToSend.length > 0){
    if(selectedApi === 'ollama'){
      aiBubble.textContent = 'エラー: Ollamaは画像に対応していません。OpenAIを選択してください。';
      statusEl.textContent = '送信失敗';
      return;
    }
    
    const formData = new FormData();
    formData.append('text', text || '画像を送信しました');
    imagesToSend.forEach(img => {
      formData.append('images', img);
    });

    res = await fetch('/api/chat_stream_with_images', {
      method: 'POST',
      body: formData,
    });
  } else {
    // テキストのみの場合、選択されたAPIのエンドポイントを使用
    const endpoint = selectedApi === 'ollama' ? '/api/chat_stream_local' : '/api/chat_stream';
    
    res = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text }),
    });
  }

  if(res.status === 401){
    alert('ログインが必要です。ログインページに移動します');
    window.location.href = '/login';
    return;
  }

  if(!res.ok || !res.body){
    statusEl.textContent = '送信失敗';
    aiBubble.textContent = 'サーバエラーが発生しました。';
    return;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buffer = '';

  while(true){
    const { value, done } = await reader.read();
    if(done) break;
    buffer += decoder.decode(value, {stream:true});

    let idx;
    while((idx = buffer.indexOf('\n\n')) >= 0){
      const eventChunk = buffer.slice(0, idx).trim();
      buffer = buffer.slice(idx + 2);

      if(eventChunk.startsWith('data:')){
        const jsonStr = eventChunk.slice(5).trim();
        if(!jsonStr) continue;
        try{
          const evt = JSON.parse(jsonStr);
          if(evt.type === 'delta'){
            aiBubble.textContent += evt.text || '';
            chatEl.scrollTop = chatEl.scrollHeight;
          }else if(evt.type === 'final'){
            const result = evt.result || {};
            setRiskPanel(result);
            statusEl.textContent = '送信完了';
          }else if(evt.type === 'error'){
            aiBubble.textContent += `\n[エラー] ${evt.message || '不明なエラー'}`;
            statusEl.textContent = '送信失敗';
          }
        }catch(_e){ }
      }
    }
  }
}

async function loadMyLogs(){
  const r = await fetch(`/api/messages/me`, { credentials: 'same-origin' });
  if(r.status === 401){
    alert('ログインが必要です。ログインページに移動します');
    window.location.href = '/login';
    return [];
  }
  const data = await r.json();
  const box = document.getElementById('myLogs');
  box.innerHTML = '';
  data.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'border rounded p-2 bg-gray-50';
    const det = m.ai_risk_detail || {};
    const sc = det.scores || {};
    const text = `[${m.created_at}] 総合:${m.ai_risk_overall ?? '-'} / `+
                 `self:${sc.self_harm ?? '-'} bully:${sc.bullying ?? '-'} tru:${sc.truancy ?? '-'} health:${sc.health ?? '-'}`;
    div.textContent = text;

    const btn = document.createElement('button');
    btn.className = 'ml-2 text-xs text-indigo-600 underline';
    btn.textContent = '再現';
    btn.onclick = (e)=>{
      e.preventDefault();
      replayMessage(m.text);
    };
    div.appendChild(btn);
    box.appendChild(div);
  });
  return data;
}

function replayMessage(text){
  const ta = document.getElementById('msg');
  ta.value = text;
  setTimeout(()=>{ sendMsg(); }, 50);
}

async function toggleMyLogs(){
  const wrapper = document.getElementById('myLogsWrapper');
  const icon = document.getElementById('toggleIcon');
  const isOpen = wrapper.style.maxHeight && wrapper.style.maxHeight !== '0px';
  if(isOpen){
    wrapper.style.maxHeight = '0';
    wrapper.style.opacity = '0';
    icon.style.transform = '';
    return;
  }
  await loadMyLogs();
  wrapper.style.opacity = '1';
  requestAnimationFrame(()=>{
    const h = wrapper.scrollHeight;
    wrapper.style.maxHeight = h + 'px';
    icon.style.transform = 'rotate(180deg)';
  });
}

// 画像選択処理（複数対応）
let selectedImages = [];

function handleImageSelect(event){
  const files = Array.from(event.target.files);
  
  files.forEach(file => {
    // ファイルサイズチェック（5MB制限）
    if(file.size > 5 * 1024 * 1024){
      alert(`${file.name} は5MB以下にしてください`);
      return;
    }
    
    // 画像タイプチェック
    if(!file.type.startsWith('image/')){
      alert(`${file.name} は画像ファイルではありません`);
      return;
    }
    
    // 重複チェック
    if(selectedImages.some(img => img.name === file.name && img.size === file.size)){
      return;
    }
    
    selectedImages.push(file);
    
    // プレビュー表示
    const reader = new FileReader();
    reader.onload = (e) => {
      addImagePreview(e.target.result, selectedImages.length - 1);
    };
    reader.readAsDataURL(file);
  });
  
  // inputをリセット（同じファイルを再選択可能にする）
  event.target.value = '';
}

function addImagePreview(src, index){
  const container = document.getElementById('imagePreviewContainer');
  
  const wrapper = document.createElement('div');
  wrapper.className = 'relative';
  wrapper.dataset.index = index;
  
  const img = document.createElement('img');
  img.src = src;
  img.className = 'w-20 h-20 object-cover rounded-lg border-2 border-gray-200';
  
  const removeBtn = document.createElement('button');
  removeBtn.className = 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm hover:bg-red-600 shadow-lg';
  removeBtn.innerHTML = '×';
  removeBtn.onclick = () => removeImage(index);
  
  wrapper.appendChild(img);
  wrapper.appendChild(removeBtn);
  container.appendChild(wrapper);
}

function removeImage(index){
  selectedImages.splice(index, 1);
  updateImagePreviews();
}

function updateImagePreviews(){
  const container = document.getElementById('imagePreviewContainer');
  container.innerHTML = '';
  
  selectedImages.forEach((file, index) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      addImagePreview(e.target.result, index);
    };
    reader.readAsDataURL(file);
  });
}

function clearAllImages(){
  selectedImages = [];
  document.getElementById('imagePreviewContainer').innerHTML = '';
}

// Enterキーで送信（Shift+Enterで改行）
function handleKeyDown(event){
  if(event.key === 'Enter' && !event.shiftKey){
    event.preventDefault();
    sendMsg();
  }
}

// === chat_from_ai からのシードメッセージ対応（/chat に来たら自動送信） ===
// 受信箱からのシード（AI最初の発話）
let seedAiMsg = null;

function seedFromInboxIfAny(){
  const seed = sessionStorage.getItem('seed_msg');
  if (!seed) return;

  // 左側（AI側）にまず表示
  seedAiMsg = seed;
  line(seedAiMsg, 'left');

  // 受信箱(localStorage)から一致するものを1件削除 -> バッジ更新
  try {
    const inbox = JSON.parse(localStorage.getItem('ai_inbox') || '[]');
    const idx = inbox.findIndex(m => m && m.text === seed);
    if (idx >= 0) {
      inbox.splice(idx, 1);
      localStorage.setItem('ai_inbox', JSON.stringify(inbox));
      window.dispatchEvent(new CustomEvent('ai_inbox_updated'));
    }
  } catch(_) {}

  // テキストエリアに「返信を書く」雰囲気を出す（任意）
  const ta = document.getElementById('msg');
  if (ta && !ta.value) ta.placeholder = 'このメッセージへの返信を書いてください';

  // 使い終わったらクリア
  sessionStorage.removeItem('seed_msg');
}

// 未読件数をチェックして表示
async function checkUnreadMessages(){
  try {
    const r = await fetch('/api/direct/unread_count', { credentials: 'same-origin' });
    if(!r.ok) return;
    const data = await r.json();
    const count = data.count || 0;
    
    const badge = document.getElementById('chatUnreadBadge');
    if(count > 0){
      badge.textContent = `${count}件未読`;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  } catch(e) {
    console.error('未読件数の取得に失敗:', e);
  }
}

// ページ読み込み時とメッセージ送信後に未読チェック
document.addEventListener('DOMContentLoaded', () => {
  seedFromInboxIfAny();    
  checkUnreadMessages();
  // 30秒ごとに未読チェック
  setInterval(checkUnreadMessages, 30000);
});

</script>
{% endblock %}
