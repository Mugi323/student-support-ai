<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "Student Support MVP" }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
<header class="bg-indigo-600 text-white">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-semibold">学生相談</a>
    <nav class="space-x-4 text-sm flex items-center">
      <a href="/" class="hover:underline">ホーム</a>
      <a href="/dashboard" class="hover:underline mr-4">教員ダッシュボード</a>
      {% if request.session.user_id %}
        <span class="text-sm mr-3">{{ request.session.user_id }} ({{ request.session.role }})</span>
        <form method="post" action="/logout" class="inline">
          <button class="bg-white text-indigo-600 px-2 py-1 rounded text-sm">ログアウト</button>
        </form>
      {% else %}
        <a href="/login" class="underline">ログイン</a>
      {% endif %}
    </nav>
  </div>
</header>
<main class="max-w-5xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>
<footer class="text-center text-xs text-gray-500 py-6">© Student Support MVP</footer>
</body>
</html>
