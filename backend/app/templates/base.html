<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "CareBridge" }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
</head>
<body class="bg-gray-50 text-gray-900">
<header class="bg-indigo-600 text-white">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
  <a id="brand" href="/" class="font-semibold">CareBridge</a>
    <nav class="space-x-4 text-sm flex items-center">
      <a href="/" class="hover:underline">ホーム</a>
      {% if request.session.user_id %}
        <span id="headerUser" class="text-sm mr-3">{{ request.session.name or request.session.user_id }} ({{ request.session.role }})</span>
        <form method="post" action="/logout" class="inline">
          <button id="btnLogout" class="bg-white text-indigo-600 px-2 py-1 rounded text-sm">ログアウト</button>
        </form>
      {% else %}
        <a id="btnLogin" href="/login" class="bg-white text-indigo-600 px-2 py-1 rounded text-sm inline-block">ログイン</a>
      {% endif %}
    </nav>
  </div>
</header>
<main class="max-w-5xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>
<footer class="text-center text-xs text-gray-500 py-6">© Student Support MVP</footer>

<!-- ▼▼▼ 追加：AIメッセージの共通ポーラー（全ページで5分ごとに取得） ▼▼▼ -->
<script>
(() => {
  if (window.__aiGlobalPollerInitialized) return;
  window.__aiGlobalPollerInitialized = true;

  const ENDPOINT = "/api/chat_from_ai";
  const INTERVAL_MS = 5 * 60 * 1000; // 5分
  const KEY = "ai_inbox";            // localStorage の保存キー

  // 受信箱の読み書き
  function loadInbox() {
    try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
    catch { return []; }
  }
  function saveInbox(arr) {
    localStorage.setItem(KEY, JSON.stringify(arr));
  }

  async function fetchAndStore() {
    try {
      const r = await fetch(ENDPOINT, { method: "POST", credentials: "same-origin" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      const msg = {
        text: data.message ?? "(空のメッセージ)",
        ts: Date.now(),
      };
      const inbox = loadInbox();
      inbox.unshift(msg);            // 新しい順に先頭へ
      if (inbox.length > 200) inbox.length = 200; // 上限
      saveInbox(inbox);

      // chat_from_ai ページ等に通知（開いていれば即時リフレッシュ）
      window.dispatchEvent(new CustomEvent("ai_inbox_updated"));
    } catch (e) {
      console.warn("[AI Inbox] fetch failed:", e);
    }
  }

  // タブがアクティブなときだけ動かして省電力
  let timer = null;
  function start() {
    if (timer) return;
    // 起動直後に1回実行
    fetchAndStore();
    // 以後5分ごと
    timer = setInterval(fetchAndStore, INTERVAL_MS);
  }
  function stop() {
    if (timer) { clearInterval(timer); timer = null; }
  }

  if (!document.hidden) start();
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stop(); else start();
  });

  // 他ページから呼べるユーティリティ（chat_from_ai.html 用）
  window.aiInboxFetchNow = fetchAndStore;
  window.aiInbox = {
    load: () => loadInbox(),
    clear: () => { saveInbox([]); window.dispatchEvent(new CustomEvent("ai_inbox_updated")); },
  };
})();
</script>
<!-- ▲▲▲ 追加ここまで ▲▲▲ -->

</body>
</html>
