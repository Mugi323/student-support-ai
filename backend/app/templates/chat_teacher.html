{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
	<!-- 相手一覧 -->
	<div class="bg-white rounded-2xl shadow p-4">
		<div class="flex items-center justify-between mb-2">
			<h2 class="text-lg font-semibold">相手を選ぶ</h2>
			<span id="unreadBadge" class="text-xs bg-red-500 text-white px-2 py-0.5 rounded hidden"></span>
		</div>
		<div id="participants" class="space-y-2"></div>
	</div>

	<!-- チャット本体 -->
	<div class="lg:col-span-2 bg-white rounded-2xl shadow p-4 flex flex-col">
		<div class="flex items-center justify-between mb-2">
			<h2 id="chatTitle" class="text-lg font-semibold">1対1チャット</h2>
			<div id="status" class="text-xs text-gray-500">未接続</div>
		</div>
		<div id="chat" class="flex-1 overflow-y-auto space-y-3 border rounded p-3 bg-gray-50"></div>
		
		<!-- 匿名モード切り替え（生徒のみ表示） -->
		<div id="anonymousToggle" class="mt-2 hidden">
			<label class="flex items-center gap-2 text-sm cursor-pointer bg-yellow-50 border border-yellow-300 rounded p-2">
				<input type="checkbox" id="anonymousMode" class="rounded" onchange="toggleAnonymousMode()">
				<span class="flex items-center gap-1">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
						<path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
					</svg>
					匿名モードで送信（先生に名前が表示されません）
				</span>
			</label>
		</div>
		
		<div class="mt-3 flex gap-2">
			<textarea id="msg" class="flex-1 border rounded p-2 min-h-[60px]" placeholder="メッセージを入力" onkeydown="handleKeyDown(event)"></textarea>
			<button class="px-4 py-2 bg-indigo-600 text-white rounded" onclick="sendMsg()">送信</button>
		</div>
	</div>
</div>

<script>
let currentOtherId = null;
let currentUserRole = null; // 自分の役割を保存
const chatEl = document.getElementById('chat');
const statusEl = document.getElementById('status');

// 教員タイプの日本語表示
const teacherTypeLabels = {
	'teacher': '教師',
	'school_nurse': '養護教諭',
	'counselor': 'カウンセラー'
};

function line(text, side='left', isAnonymous=false, senderId=null){
	const wrap = document.createElement('div');
	wrap.className = `flex ${side==='right'?'justify-end':''}`;
	const bubble = document.createElement('div');
	bubble.className = `max-w-[80%] p-2 rounded-xl ${side==='right'?'bg-indigo-600 text-white':'bg-white border'} shadow whitespace-pre-wrap`;
	
	// 匿名メッセージの場合は🔒アイコンを表示
	if(isAnonymous && side === 'left'){
		const anonymousLabel = document.createElement('div');
		anonymousLabel.className = 'text-xs text-gray-500 mb-1 flex items-center gap-1';
		anonymousLabel.innerHTML = '🔒 匿名メッセージ';
		bubble.appendChild(anonymousLabel);
	}
	
	const textNode = document.createTextNode(text);
	bubble.appendChild(textNode);
	wrap.appendChild(bubble);
	chatEl.appendChild(wrap);
	chatEl.scrollTop = chatEl.scrollHeight;
}

async function loadParticipants(){
	const r = await fetch('/api/direct/participants', {credentials:'same-origin'});
	if(r.status === 401){
		alert('ログインが必要です');
		location.href = '/login';
		return;
	}
	const data = await r.json();
	
	// 未読件数を取得
	const unreadR = await fetch('/api/direct/unread_by_sender', {credentials:'same-origin'});
	const unreadData = unreadR.ok ? await unreadR.json() : {};
	
	const box = document.getElementById('participants');
	box.innerHTML = '';
	
	// 生徒の場合：教師タイプでグループ分け
	if(currentUserRole === 'student'){
		// データをタイプ別に分類
		const groups = {
			teacher: [],
			school_nurse: [],
			counselor: []
		};
		
		data.forEach(p => {
			const type = p.teacher_type || 'teacher';
			if(groups[type]){
				groups[type].push(p);
			}
		});
		
		// 各グループを表示
		const groupTitles = {
			teacher: '👨‍🏫 教師',
			school_nurse: '🏥 養護教諭',
			counselor: '💬 カウンセラー'
		};
		
		['teacher', 'school_nurse', 'counselor'].forEach(type => {
			if(groups[type].length > 0){
				// グループタイトル
				const groupTitle = document.createElement('div');
				groupTitle.className = 'text-sm font-semibold text-gray-700 mt-3 mb-1 px-2';
				groupTitle.textContent = groupTitles[type];
				box.appendChild(groupTitle);
				
				// グループ内の教師
				groups[type].forEach(p => {
					const btn = createParticipantButton(p, unreadData);
					box.appendChild(btn);
				});
			}
		});
	} else {
		// 教師の場合：生徒と匿名生徒を表示（グループ分けなし）
		data.forEach(p => {
			const btn = createParticipantButton(p, unreadData);
			box.appendChild(btn);
		});
	}
}

function createParticipantButton(p, unreadData){
	const btn = document.createElement('button');
	
	// 未読件数を取得
	const unreadCount = unreadData[p.user_id] || 0;
	
	// 匿名生徒の場合は背景色を変える
	if(p.is_anonymous){
		btn.className = 'w-full text-left border rounded px-3 py-2 hover:bg-gray-50 bg-yellow-50 border-yellow-300 relative';
		btn.innerHTML = `
			🔒 ${p.name} <span class="text-xs text-gray-500">(匿名)</span>
			${unreadCount > 0 ? `<span class="absolute right-2 top-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">${unreadCount}</span>` : ''}
		`;
	} else {
		btn.className = 'w-full text-left border rounded px-3 py-2 hover:bg-gray-50 relative';
		
		// 生徒側でグループ分けしている場合は役割ラベルを表示しない
		let displayLabel = '';
		if(currentUserRole !== 'student'){
			// 教師側：生徒の役割を表示
			displayLabel = p.role === 'student' ? ' <span class="text-xs text-gray-600">(生徒)</span>' : '';
		}
		
		btn.innerHTML = `
			${p.name}${displayLabel}
			${unreadCount > 0 ? `<span class="absolute right-2 top-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">${unreadCount}</span>` : ''}
		`;
	}
	
	btn.onclick = ()=> selectOther(p.user_id, p.name, p.is_anonymous, p.teacher_type);
	return btn;
}

async function selectOther(uid, name, isAnonymous, teacherType){
	currentOtherId = uid;
	
	// チャットタイトルに役割も表示
	let titleSuffix = '';
	if(isAnonymous){
		titleSuffix = '(匿名)';
	} else if(teacherType){
		titleSuffix = `(${teacherTypeLabels[teacherType] || teacherType})`;
	}
	
	// 匿名生徒の場合はチャットタイトルにも匿名表示
	if(isAnonymous){
		document.getElementById('chatTitle').textContent = `1対1チャット: 🔒 ${name} ${titleSuffix}`;
	} else {
		document.getElementById('chatTitle').textContent = `1対1チャット: ${name} ${titleSuffix}`;
	}
	
	chatEl.innerHTML = '';
	await loadMessages();
	// 既読化
	await fetch(`/api/direct/messages/${currentOtherId}/read`, {method:'POST'});
	
	// 既読化後、未読バッジと参加者リストを更新
	refreshUnread();
	loadParticipants();
	
	statusEl.textContent = '接続中';
	
	// 生徒の場合のみ匿名トグルを表示
	const anonymousToggle = document.getElementById('anonymousToggle');
	if(currentUserRole === 'student'){
		anonymousToggle.classList.remove('hidden');
	} else {
		anonymousToggle.classList.add('hidden');
	}
}

async function loadMessages(){
	if(!currentOtherId) return;
	
	// 匿名モードのチェック状態を取得
	const anonymousModeCheckbox = document.getElementById('anonymousMode');
	const isAnonymousMode = anonymousModeCheckbox ? anonymousModeCheckbox.checked : false;
	
	// 匿名モードの場合はクエリパラメータを追加
	const url = isAnonymousMode 
		? `/api/direct/messages/${currentOtherId}?anonymous=true`
		: `/api/direct/messages/${currentOtherId}`;
	
	const r = await fetch(url);
	const data = await r.json();
	chatEl.innerHTML = '';
	
	// 匿名チャットかどうかを判定
	const realOtherId = currentOtherId.replace(':anonymous', '');
	
	data.forEach(m=>{
		const side = (m.sender_id === realOtherId || m.sender_id === currentOtherId) ? 'left' : 'right';
		const isAnonymous = m.is_anonymous || false;
		line(m.text, side, isAnonymous, m.sender_id);
	});
}

async function sendMsg(){
	const ta = document.getElementById('msg');
	const text = ta.value.trim();
	if(!text || !currentOtherId) return;
	
	// 匿名モードのチェック状態を取得
	const anonymousModeCheckbox = document.getElementById('anonymousMode');
	const isAnonymous = anonymousModeCheckbox ? anonymousModeCheckbox.checked : false;
	
	ta.value = '';
	line(text, 'right', isAnonymous);
	
	// 匿名フラグを含めて送信
	const r = await fetch(`/api/direct/messages/${currentOtherId}`, {
		method: 'POST',
		headers: {'Content-Type':'application/json'},
		body: JSON.stringify({text, is_anonymous: isAnonymous})
	});
	if(!r.ok){
		alert('送信に失敗しました');
		return;
	}
	// 再読込（相手側のボットなどはないので自分側は末尾だけでOK）
}

function handleKeyDown(e){
	if(e.key === 'Enter' && !e.shiftKey){
		e.preventDefault();
		sendMsg();
	}
}

// 匿名モード切り替え時にメッセージを再読み込み
function toggleAnonymousMode(){
	loadMessages();
}

async function refreshUnread(){
	const r = await fetch('/api/direct/unread_count');
	if(!r.ok) return;
	const {count} = await r.json();
	const badge = document.getElementById('unreadBadge');
	if(count>0){
		badge.textContent = `未読 ${count}`;
		badge.classList.remove('hidden');
	}else{
		badge.classList.add('hidden');
	}
}

function getQuery(key){
	const u = new URL(location.href);
	return u.searchParams.get(key);
}

async function boot(){
	// 自分の役割を取得
	try{
		const r = await fetch('/api/direct/participants');
		const participants = await r.json();
		// 参加者から自分の役割を推測（teacherなら生徒リスト、studentなら教師リスト）
		if(participants.length > 0){
			// 最初の参加者の役割をチェック
			const firstParticipantRole = participants[0].role;
			currentUserRole = firstParticipantRole === 'teacher' ? 'student' : 'teacher';
		}
	}catch(_e){
		currentUserRole = 'student'; // デフォルトは生徒
	}
	
	await loadParticipants();
	refreshUnread();
	
	// 10秒ごとに未読バッジと参加者リストを更新
	setInterval(() => {
		refreshUnread();
		loadParticipants(); // 参加者リストの未読バッジも更新
	}, 10000);
	
	// クエリのuidがあれば自動選択
	const pre = getQuery('uid');
	if(pre){
		// 参加者情報を取得し、名前解決
		try{
			const r = await fetch('/api/direct/participants');
			const arr = await r.json();
			const hit = arr.find(x=>x.user_id===pre);
			if(hit){
				await selectOther(hit.user_id, hit.name, hit.is_anonymous);
			}
		}catch(_e){/* ignore */}
	}
	// 10秒ごとにメッセージ一覧を再取得（簡易ポーリング）
	setInterval(()=>{ if(currentOtherId) loadMessages(); }, 10000);
}

boot();
</script>
{% endblock %}
