{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow">
  <h2 class="text-lg font-semibold mb-4">ログイン / 新規登録</h2>
  <form method="post" action="/login" class="space-y-3">
    <div>
      <label class="block text-sm">表示名</label>
      <input name="name" required class="w-full border rounded px-2 py-1" placeholder="例: tanaka" />
    </div>
    <div>
      <label class="block text-sm">パスワード</label>
      <input name="password" type="password" required class="w-full border rounded px-2 py-1" placeholder="パスワードを入力" />
    </div>
    <div>
      <label class="block text-sm">役割</label>
      <select name="role" class="w-full border rounded px-2 py-1">
        <option value="student">学生</option>
        <option value="teacher">教員</option>
      </select>
    </div>
    {% if error %}
      <div class="text-sm text-red-600">{{ error }}</div>
    {% endif %}
    <div class="flex justify-end">
      <button id="btnLoginSubmit" class="bg-indigo-600 text-white px-4 py-2 rounded">ログイン</button>
    </div>
  </form>

  <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="flex-shrink mx-4 text-gray-500 text-sm">またはその他の方法で</span>
        <div class="flex-grow border-t border-gray-300"></div>
    </div>

    <a href="/login/google" class="w-full inline-flex items-center justify-center border border-gray-300 rounded-lg shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 transition duration-150">
        <svg class="w-5 h-5 mr-2" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M44.5 20H24V28.5H35.5C34.7 32.2 32.2 35.3 28.5 37.3V43.5C37.5 41.5 44.5 33.7 44.5 24C44.5 22.7 44.3 21.3 44 20H44.5Z" fill="#4285F4"/>
            <path d="M24 44.5C30.3 44.5 35.6 42.4 39.5 38.6L33.7 33.5C30.4 35.6 27.2 37.1 24 37.1C18.6 37.1 14 33.7 12.3 28.9H5.8V35.3C9.4 40.5 16.2 44.5 24 44.5Z" fill="#34A853"/>
            <path d="M12.3 28.9C11.9 27.6 11.7 26.3 11.7 25C11.7 23.7 11.9 22.4 12.3 21.1V14.7H5.8C4.5 17.3 3.8 20.1 3.8 23C3.8 25.9 4.5 28.7 5.8 31.3L12.3 28.9Z" fill="#FBBC05"/>
            <path d="M24 10.9C27.4 10.9 30.6 12.3 33 14.7L39.5 8.2C35.6 4.4 30.3 2.5 24 2.5C16.2 2.5 9.4 6.5 5.8 11.7L12.3 14.7C14 9.9 18.6 6.5 24 6.5C24 6.5 24 6.5 24 6.5V10.9Z" fill="#EA4335"/>
        </svg>
        Googleでログイン
    </a>
</div>
{% endblock %}
